<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Riwaq Labs</title>
<meta name="description" content="Get in touch with Riwaq Labs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400;500&family=Reem+Kufi:wght@400;500;600&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #07050F;
    --bg2:       #0E0A1A;
    --copper:    #C4862A;
    --copper-dim:#8A5010;
    --ivory:     #F0E6D2;
    --parchment: #F5EDD8;
    --text:      #D4C4A8;
    --text-dim:  #7A6A54;
    --border:    rgba(196,134,42,0.18);
    --nav-h:     64px;
  }
  [data-theme="light"] {
    --bg:        #F5EDD8;
    --bg2:       #EDE3CE;
    --ivory:     #07050F;
    --text:      #1A1008;
    --text-dim:  #5A4A34;
    --border:    rgba(138,80,16,0.2);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    background: rgba(7,5,15,0.97);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  [data-theme="light"] nav { background: rgba(245,237,224,0.98); }

  .nav-logo {
    text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo-text { font-family: 'Cinzel', serif; font-size: .9rem; font-weight: 700; color: var(--copper); letter-spacing: 2px; }
  .nav-logo-sub  { font-family: 'Jost', sans-serif; font-size: .55rem; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }

  .nav-right { display: flex; align-items: center; gap: 16px; }

  .theme-btn {
    background: none; border: 1px solid var(--border);
    color: var(--copper); cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
  }
  .back-btn {
    font-family: 'Jost', sans-serif; font-size: .75rem;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--copper); text-decoration: none;
    border: 1px solid var(--border); padding: 6px 16px;
    transition: background .2s;
  }
  .back-btn:hover { background: rgba(196,134,42,0.1); }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: calc(var(--nav-h) + 48px) 24px 80px;
  }

  .contact-wrap {
    width: 100%; max-width: 560px;
  }

  /* ── ORNAMENT ── */
  .ornament {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }
  .ornament-line { flex: 1; height: 1px; background: var(--border); }
  .ornament-gem  { width: 6px; height: 6px; background: var(--copper); transform: rotate(45deg); flex-shrink: 0; }

  /* ── HEADING ── */
  .contact-eyebrow {
    font-family: 'Jost', sans-serif; font-size: .68rem;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--copper); margin-bottom: 10px; text-align: center;
  }
  .contact-title {
    font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 600;
    color: var(--ivory); text-align: center; margin-bottom: 10px;
  }
  .contact-sub {
    font-family: 'Cormorant Garamond', serif; font-size: 1rem;
    color: var(--text-dim); text-align: center; margin-bottom: 40px;
    font-style: italic;
  }

  /* ── FORM ── */
  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-family: 'Jost', sans-serif; font-size: .68rem;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--copper); margin-bottom: 8px;
  }

  input, textarea, select {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Jost', sans-serif; font-size: .9rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
    border-radius: 0;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--copper);
  }
  textarea { resize: vertical; min-height: 120px; }

  select option { background: var(--bg2); }

  /* ── SUBMIT ── */
  .submit-btn {
    width: 100%;
    background: var(--copper);
    color: var(--bg);
    border: none; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: .8rem;
    font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
    padding: 16px;
    margin-top: 8px;
    transition: background .2s, opacity .2s;
  }
  .submit-btn:hover { background: #D4962A; }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── SUCCESS STATE ── */
  .success-msg {
    display: none;
    text-align: center; padding: 48px 24px;
  }
  .success-gem {
    width: 48px; height: 48px; background: var(--copper);
    transform: rotate(45deg); margin: 0 auto 24px;
  }
  .success-title {
    font-family: 'Cinzel', serif; font-size: 1.4rem;
    color: var(--ivory); margin-bottom: 12px;
  }
  .success-text {
    font-family: 'Cormorant Garamond', serif; font-size: 1rem;
    color: var(--text-dim); font-style: italic;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 24px;
    font-family: 'Jost', sans-serif; font-size: .65rem;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); border-top: 1px solid var(--border);
  }
  footer a { color: var(--copper); text-decoration: none; }

  @media (max-width: 480px) {
    nav { padding: 0 20px; }
    .contact-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div>
      <div class="nav-logo-text">RIWAQ LABS</div>
      <div class="nav-logo-sub">Where Knowledge Gathers</div>
    </div>
  </a>
  <div class="nav-right">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">☽</button>
    <a href="/" class="back-btn">← Back</a>
  </div>
</nav>

<main>
  <div class="contact-wrap">

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-gem"></div>
      <div class="ornament-line"></div>
    </div>

    <p class="contact-eyebrow">Riwaq Labs · رواق لابز</p>
    <h1 class="contact-title">Get In Touch</h1>
    <p class="contact-sub">We read every message and respond personally.</p>

          <p class="success-text">جزاك الله خيراً — we will be in touch.</p>
    </div>

    <!-- CONTACT FORM — Netlify handles submission and emails riwaq@riwaqlabs.com -->
    <form id="contact-form" name="contact" method="POST" action="success.html" data-netlify="true" netlify-honeypot="bot-field">
      <!-- Netlify honeypot -->
      <input type="hidden" name="form-name" value="contact">
      <div style="display:none"><input name="bot-field"></div>

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Ahmad Al-Rashid" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option value="general">General Enquiry</option>
          <option value="app-feedback">App Feedback</option>
          <option value="partnership">Partnership</option>
          <option value="press">Press & Media</option>
          <option value="bug">Bug Report</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Your message..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">Send Message</button>
    </form>

  </div>
</main>

<footer>
  © 2025 Riwaq Labs · رواق لابز · <a href="/">riwaqlabs.com</a>
</footer>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('theme-btn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '☀';
    localStorage.setItem('rl_theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☽';
    localStorage.setItem('rl_theme', 'dark');
  }
}

// Restore theme
const saved = localStorage.getItem('rl_theme');
if (saved) {
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = saved === 'dark' ? '☽' : '☀';
}

  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Send Message';
    alert('Something went wrong. Please try again.');
  }
}
</script>
</body>
</html>
